{% load static %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приєднатися до X / X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/registration.css' %}">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0 main-container">
        
        <div class="col-md-6 left-section">
            <img src="{% static 'img/logo.jpg' %}" alt="logo" class="big-logo">
        </div>

        <div class="col-md-6 right-section">
            <div class="form-wrapper">
                <div class="d-md-none mb-4">
                    <img src="{% static 'img/logo.jpg' %}" alt="logo" style="height: 40px;">
                </div>

                <h1 class="main-title">Приєднуйтесь сьогодні</h1>
                <h3 class="sub-title">Створіть акаунт</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="d-grid gap-3 mt-4">
                        <button type="submit" class="btn btn-black">Зареєструватися</button>
                    </div>
                </form>

                <div class="mt-5">
                    <p class="text-muted">
                        Вже маєте акаунт? 
                        <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-bold">Увійти</a>
                    </p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
