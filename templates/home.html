{% extends "base.html" %}
{% block title %}
    Home / Clone X
{% endblock title %}
{% block content %}
    {% for article in article_list %}
        <div class="card">
            <div class="card-header">
                <span class="fw-bold">
                    <a href="{% url 'article_detail' username=article.author.username pk=article.pk %}">{{ article.title }}</a>
                </span> &middot;
                <span class="text-muted">by {{ article.author }} |
                {{ article.date }}</span>
            </div>
            <div class="card-body">{{ article.text }}</div>
        {% endfor %}
    {% endblock content %}
